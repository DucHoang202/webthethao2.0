name: Next.js CI/CD

on:
  push:
    branches:
      - dev
      - staging
      - main
  pull_request:
    branches:
      - dev
      - staging
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build 2>&1 | tee build.log

      - name: Detect branch
        id: branch
        run: echo "BRANCH=${GITHUB_REF##*/}" >> $GITHUB_ENV

      - name: Notify Mattermost Success
        if: success()
        run: |
          curl -X POST -H 'Content-Type: application/json' \
          -d "{
          \"text\": \"✅ CI SUCCESS\nRepo: ${{ github.repository }}\nBranch: $BRANCH\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}\"
          }" \
          ${{ secrets.MATTERMOST_WEBHOOK }}

      - name: Notify Mattermost Failure
        if: failure()
        run: |
          LOG=$(tail -n 25 build.log | sed 's/"/\\"/g')
          curl -X POST -H 'Content-Type: application/json' \
          -d "{
          \"text\": \"❌ CI FAILED\nRepo: ${{ github.repository }}\nBranch: $BRANCH\n\n\`\`\`\n$LOG\n\`\`\`\"
          }" \
          ${{ secrets.MATTERMOST_WEBHOOK }}
